name: Daily Infrastructure Monitoring

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC — external reachability check

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install app dependencies
        run: npm ci

      - name: Install postgres client
        run: sudo apt-get install -y postgresql-client

      - name: Check PostgreSQL connectivity
        id: pg_check
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PGSSLMODE: require
        run: |
          echo "Checking PostgreSQL connectivity..."
          # Strip sslmode param from URL since PGSSLMODE env var handles it
          CLEAN_URL=$(echo "$DATABASE_URL" | sed 's/[?&]sslmode=[^&]*//')
          RESULT=$(psql "$CLEAN_URL" -c "SELECT count(*) AS total FROM fca_fines;" -t -A 2>&1)
          if [ $? -eq 0 ]; then
            echo "✅ PostgreSQL OK — $RESULT fines in database"
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "detail=PostgreSQL OK — $RESULT fines in database" >> $GITHUB_OUTPUT
          else
            echo "❌ PostgreSQL FAILED: $RESULT"
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "detail=PostgreSQL FAILED: $RESULT" >> $GITHUB_OUTPUT
          fi

      - name: Check FCA Fines API
        id: fcafines_check
        continue-on-error: true
        run: |
          echo "Checking FCA Fines API..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --connect-timeout 10 https://regactions.com/api/fca-fines/years 2>&1 || echo "000")
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✅ FCA Fines API OK (HTTP $HTTP_CODE)"
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "detail=FCA Fines API OK (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
          else
            echo "❌ FCA Fines API FAILED (HTTP $HTTP_CODE)"
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "detail=FCA Fines API FAILED (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
          fi

      - name: Check MEMA Platform
        id: mema_check
        continue-on-error: true
        run: |
          echo "Checking MEMA Platform..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --connect-timeout 10 https://memaconsultants.com 2>&1 || echo "000")
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✅ MEMA Platform OK (HTTP $HTTP_CODE)"
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "detail=MEMA Platform OK (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
          else
            echo "❌ MEMA Platform FAILED (HTTP $HTTP_CODE)"
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "detail=MEMA Platform FAILED (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
          fi

      - name: Check Horizon Scanner
        id: horizon_check
        continue-on-error: true
        run: |
          echo "Checking Horizon Scanner..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --connect-timeout 10 https://regcanary.com 2>&1 || echo "000")
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✅ Horizon Scanner OK (HTTP $HTTP_CODE)"
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "detail=Horizon Scanner OK (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
          else
            echo "❌ Horizon Scanner FAILED (HTTP $HTTP_CODE)"
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "detail=Horizon Scanner FAILED (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
          fi

      - name: Check FOS Complaints
        id: fos_check
        continue-on-error: true
        run: |
          echo "Checking FOS Complaints..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --connect-timeout 10 https://foscomplaints.memaconsultants.com 2>&1 || echo "000")
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✅ FOS Complaints OK (HTTP $HTTP_CODE)"
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "detail=FOS Complaints OK (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
          else
            echo "❌ FOS Complaints FAILED (HTTP $HTTP_CODE)"
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "detail=FOS Complaints FAILED (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
          fi

      - name: Check Plannetic
        id: plannetic_check
        continue-on-error: true
        run: |
          echo "Checking Plannetic..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --connect-timeout 10 https://plannetic.com 2>&1 || echo "000")
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✅ Plannetic OK (HTTP $HTTP_CODE)"
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "detail=Plannetic OK (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
          else
            echo "❌ Plannetic FAILED (HTTP $HTTP_CODE)"
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "detail=Plannetic FAILED (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
          fi

      - name: Check Writing Assistant API
        id: writing_check
        continue-on-error: true
        run: |
          echo "Checking Writing Assistant API..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --connect-timeout 10 https://write-89-167-95-173.sslip.io/ready 2>&1 || echo "000")
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✅ Writing Assistant OK (HTTP $HTTP_CODE)"
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "detail=Writing Assistant OK (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
          else
            echo "❌ Writing Assistant FAILED (HTTP $HTTP_CODE)"
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "detail=Writing Assistant FAILED (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
          fi

      - name: Check Nasara Connect
        id: nasara_check
        continue-on-error: true
        run: |
          echo "Checking Nasara Connect..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --connect-timeout 10 https://nasaraconnect.com 2>&1 || echo "000")
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✅ Nasara Connect OK (HTTP $HTTP_CODE)"
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "detail=Nasara Connect OK (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
          else
            echo "❌ Nasara Connect FAILED (HTTP $HTTP_CODE)"
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "detail=Nasara Connect FAILED (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
          fi

      - name: Check live regulator freshness
        id: scraper_health
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Checking live regulator freshness..."
          set +e
          npm run --silent check:live-freshness -- --json > /tmp/live-regulator-health.json
          EXIT_CODE=$?
          set -e

          if [ ! -s /tmp/live-regulator-health.json ]; then
            echo "❌ Live regulator freshness check produced no output"
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "detail=Live regulator freshness check produced no output" >> $GITHUB_OUTPUT
            exit 0
          fi

          FAILING=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('/tmp/live-regulator-health.json','utf8')); process.stdout.write(String(data.totals.failing));")
          CHECKED=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('/tmp/live-regulator-health.json','utf8')); process.stdout.write(String(data.totals.checked));")

          if [ "$EXIT_CODE" -eq 0 ] && [ "$FAILING" = "0" ]; then
            echo "✅ Live regulator freshness OK (${CHECKED} checked)"
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "detail=Live regulator freshness OK (${CHECKED} checked)" >> $GITHUB_OUTPUT
          else
            echo "❌ Live regulator freshness issues detected (${FAILING}/${CHECKED})"
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "detail=Live regulator freshness issues detected (${FAILING}/${CHECKED})" >> $GITHUB_OUTPUT
          fi

      - name: Compile results and alert on failure
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-2
          PG_STATUS: ${{ steps.pg_check.outputs.status }}
          PG_DETAIL: ${{ steps.pg_check.outputs.detail }}
          FCA_STATUS: ${{ steps.fcafines_check.outputs.status }}
          FCA_DETAIL: ${{ steps.fcafines_check.outputs.detail }}
          MEMA_STATUS: ${{ steps.mema_check.outputs.status }}
          MEMA_DETAIL: ${{ steps.mema_check.outputs.detail }}
          HOR_STATUS: ${{ steps.horizon_check.outputs.status }}
          HOR_DETAIL: ${{ steps.horizon_check.outputs.detail }}
          FOS_STATUS: ${{ steps.fos_check.outputs.status }}
          FOS_DETAIL: ${{ steps.fos_check.outputs.detail }}
          PLAN_STATUS: ${{ steps.plannetic_check.outputs.status }}
          PLAN_DETAIL: ${{ steps.plannetic_check.outputs.detail }}
          WRT_STATUS: ${{ steps.writing_check.outputs.status }}
          WRT_DETAIL: ${{ steps.writing_check.outputs.detail }}
          NAS_STATUS: ${{ steps.nasara_check.outputs.status }}
          NAS_DETAIL: ${{ steps.nasara_check.outputs.detail }}
          SCRAPE_STATUS: ${{ steps.scraper_health.outputs.status }}
          SCRAPE_DETAIL: ${{ steps.scraper_health.outputs.detail }}
          ALERT_EMAIL: ${{ vars.ALERT_EMAIL || 'ademola@memaconsultants.com' }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "========================================="
          echo "  Daily Infrastructure Monitoring Report"
          echo "  (External Reachability Check)"
          echo "========================================="
          echo ""

          FAILURES=""

          check_result() {
            local num="$1" name="$2" status="$3" detail="$4" fallback="$5"
            echo "${num}. ${detail:-${fallback}}"
            if [ "$status" != "ok" ]; then
              FAILURES="${FAILURES}
          - ${detail:-${fallback}}"
            fi
          }

          check_result "1" "PostgreSQL"         "$PG_STATUS"     "$PG_DETAIL"     "PostgreSQL connectivity failed"
          check_result "2" "FCA Fines API"      "$FCA_STATUS"    "$FCA_DETAIL"    "FCA Fines API unreachable"
          check_result "3" "MEMA Platform"      "$MEMA_STATUS"   "$MEMA_DETAIL"   "MEMA Platform unreachable"
          check_result "4" "Horizon Scanner"    "$HOR_STATUS"    "$HOR_DETAIL"    "Horizon Scanner unreachable"
          check_result "5" "FOS Complaints"     "$FOS_STATUS"    "$FOS_DETAIL"    "FOS Complaints unreachable"
          check_result "6" "Plannetic"          "$PLAN_STATUS"   "$PLAN_DETAIL"   "Plannetic unreachable"
          check_result "7" "Writing Assistant"  "$WRT_STATUS"    "$WRT_DETAIL"    "Writing Assistant API unreachable"
          check_result "8" "Nasara Connect"     "$NAS_STATUS"    "$NAS_DETAIL"    "Nasara Connect unreachable"
          check_result "9" "Scraper freshness"  "$SCRAPE_STATUS" "$SCRAPE_DETAIL" "Live regulator freshness check failed"

          echo ""
          echo "========================================="

          if [ -n "$FAILURES" ]; then
            echo "❌ FAILURES DETECTED — sending alert email"

            export FAILURES
            node -e '
              const fs = require("fs");
              const body = [
                "Daily Infrastructure Monitoring Report (External Reachability)",
                "",
                "The following checks FAILED:",
                process.env.FAILURES || "- Unknown failure",
                "",
                "Full Results:",
                `1. ${process.env.PG_DETAIL || "PostgreSQL status unavailable"}`,
                `2. ${process.env.FCA_DETAIL || "FCA Fines API status unavailable"}`,
                `3. ${process.env.MEMA_DETAIL || "MEMA Platform status unavailable"}`,
                `4. ${process.env.HOR_DETAIL || "Horizon Scanner status unavailable"}`,
                `5. ${process.env.FOS_DETAIL || "FOS Complaints status unavailable"}`,
                `6. ${process.env.PLAN_DETAIL || "Plannetic status unavailable"}`,
                `7. ${process.env.WRT_DETAIL || "Writing Assistant status unavailable"}`,
                `8. ${process.env.NAS_DETAIL || "Nasara Connect status unavailable"}`,
                `9. ${process.env.SCRAPE_DETAIL || "Scraper freshness status unavailable"}`,
                "",
                "Note: Deep checks (DB health, disk, backups, data quality) run on Hetzner at 07:15 UTC.",
                "",
                `Timestamp: ${new Date().toISOString()}`,
                `Workflow: ${process.env.WORKFLOW_URL || "unknown"}`,
              ].join("\n");
              fs.writeFileSync("/tmp/ses-email.json", JSON.stringify({
                Source: "alerts@memaconsultants.com",
                Destination: { ToAddresses: [process.env.ALERT_EMAIL || "ademola@memaconsultants.com"] },
                Message: {
                  Subject: { Data: "ALERT: Infrastructure monitoring failures detected" },
                  Body: { Text: { Data: body } },
                },
              }, null, 2));
            '

            aws ses send-email --cli-input-json file:///tmp/ses-email.json --region eu-west-2

            echo "Alert email sent"
            exit 1
          else
            echo "✅ All checks passed — no alert needed"
          fi
