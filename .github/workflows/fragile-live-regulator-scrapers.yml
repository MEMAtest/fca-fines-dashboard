name: Fragile Live Regulator Scrapers

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * 1,4" # 06:15 UTC on Monday and Thursday for lower-confidence live feeds

jobs:
  scrape:
    name: Scrape ${{ matrix.code }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: fragile-live-regulator-${{ matrix.code }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - code: DFSA
            script: scrape:dfsa
          - code: CBUAE
            script: scrape:cbuae
          - code: JFSC
            script: scrape:jfsc
          - code: CIRO
            script: scrape:ciro
          - code: FMAAT
            script: scrape:fmaat
          - code: FINMA
            script: scrape:finma
          - code: AUSTRAC
            script: scrape:austrac
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify environment configuration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is not set."
            exit 1
          fi

          echo "Environment validation passed for ${{ matrix.code }}."

      - name: Run ${{ matrix.code }} scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TS_NODE_PROJECT: tsconfig.json
          SCRAPER_RUN_SUMMARY_FILE: /tmp/${{ matrix.code }}-scrape-summary.json
        run: |
          echo "Starting ${{ matrix.code }} via npm run ${{ matrix.script }}"
          npm run ${{ matrix.script }}

      - name: Print structured scraper summary
        if: always()
        run: |
          SUMMARY_FILE="/tmp/${{ matrix.code }}-scrape-summary.json"
          if [ -f "$SUMMARY_FILE" ]; then
            echo "Structured summary for ${{ matrix.code }}:"
            cat "$SUMMARY_FILE"
          else
            echo "No structured summary emitted for ${{ matrix.code }}."
          fi

  freshness:
    name: Check fragile live-regulator freshness
    if: always()
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run freshness check for fragile live regulators
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm run check:live-freshness -- --cadence=fragile --json > /tmp/fragile-live-regulator-health.json
          cat /tmp/fragile-live-regulator-health.json

      - name: Upload fragile live-regulator health summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fragile-live-regulator-health
          path: /tmp/fragile-live-regulator-health.json
          if-no-files-found: ignore

      - name: Check for consecutive failures and alert
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-2
          ALERT_EMAIL: ${{ vars.ALERT_EMAIL || 'ademola@memaconsultants.com' }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          FAILING_REGULATORS=$(node -e "
            const pg = require('pg');
            const client = new pg.Client({ connectionString: process.env.DATABASE_URL, ssl: { rejectUnauthorized: false } });
            client.connect().then(async () => {
              const { rows } = await client.query(\`
                WITH recent AS (
                  SELECT regulator, status,
                    ROW_NUMBER() OVER (PARTITION BY regulator ORDER BY started_at DESC) AS rn
                  FROM scraper_runs
                  WHERE started_at > NOW() - INTERVAL '14 days'
                )
                SELECT regulator
                FROM recent
                WHERE rn <= 2 AND status = 'error'
                GROUP BY regulator
                HAVING COUNT(*) = 2
              \`);
              if (rows.length > 0) {
                process.stdout.write(rows.map(r => r.regulator).join(', '));
              }
              await client.end();
            }).catch(() => { process.exit(0); });
          " 2>/dev/null)
          set -e

          if [ -n "$FAILING_REGULATORS" ]; then
            echo "⚠️ Consecutive failures detected for: $FAILING_REGULATORS"

            cat > /tmp/ses-alert.json <<SESEOF
          {
            "Source": "alerts@memaconsultants.com",
            "Destination": { "ToAddresses": ["${ALERT_EMAIL}"] },
            "Message": {
              "Subject": { "Data": "SCRAPER ALERT: Consecutive failures for ${FAILING_REGULATORS}" },
              "Body": { "Text": { "Data": "The following fragile regulators have failed 2 consecutive scraper runs:\n\n${FAILING_REGULATORS}\n\nPlease investigate.\n\nWorkflow: ${WORKFLOW_URL}" } }
            }
          }
          SESEOF

            aws ses send-email --cli-input-json file:///tmp/ses-alert.json --region eu-west-2 || echo "Failed to send alert email"
          else
            echo "✅ No consecutive scraper failures detected"
          fi
