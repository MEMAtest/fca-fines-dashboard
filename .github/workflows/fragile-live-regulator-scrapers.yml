name: Fragile Live Regulator Scrapers

on:
  workflow_dispatch:
  schedule:
    - cron: '15 6 * * 1,4' # 06:15 UTC on Monday and Thursday for lower-confidence live feeds

jobs:
  scrape:
    name: Scrape ${{ matrix.code }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: fragile-live-regulator-${{ matrix.code }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - code: DFSA
            script: scrape:dfsa
          - code: CBUAE
            script: scrape:cbuae
          - code: JFSC
            script: scrape:jfsc
          - code: CIRO
            script: scrape:ciro
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify environment configuration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is not set."
            exit 1
          fi

          echo "Environment validation passed for ${{ matrix.code }}."

      - name: Run ${{ matrix.code }} scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TS_NODE_PROJECT: tsconfig.json
          SCRAPER_RUN_SUMMARY_FILE: /tmp/${{ matrix.code }}-scrape-summary.json
        run: |
          echo "Starting ${{ matrix.code }} via npm run ${{ matrix.script }}"
          npm run ${{ matrix.script }}

      - name: Print structured scraper summary
        if: always()
        run: |
          SUMMARY_FILE="/tmp/${{ matrix.code }}-scrape-summary.json"
          if [ -f "$SUMMARY_FILE" ]; then
            echo "Structured summary for ${{ matrix.code }}:"
            cat "$SUMMARY_FILE"
          else
            echo "No structured summary emitted for ${{ matrix.code }}."
          fi

  freshness:
    name: Check fragile live-regulator freshness
    if: always()
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run freshness check for fragile live regulators
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm run check:live-freshness -- --cadence=fragile
