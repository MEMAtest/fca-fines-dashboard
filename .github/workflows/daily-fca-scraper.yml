name: Daily Live Regulator Scrapers

on:
  workflow_dispatch:
  schedule:
    - cron: "45 5 * * *" # 05:45 UTC daily stable live-regulator batch

jobs:
  scrape:
    name: Scrape ${{ matrix.code }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: live-regulator-${{ matrix.code }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - code: FCA
            script: scrape:fines
          - code: BaFin
            script: scrape:bafin
          - code: AMF
            script: scrape:amf
          - code: CNMV
            script: scrape:cnmv
          - code: CBI
            script: scrape:cbi
          - code: SFC
            script: scrape:sfc
          - code: AFM
            script: scrape:afm
          - code: DNB
            script: scrape:dnb
          - code: ECB
            script: scrape:ecb
          - code: BDI
            script: scrape:bdi
          - code: ACPR
            script: scrape:acpr
          - code: CSSF
            script: scrape:cssf
          - code: FSMA
            script: scrape:fsma
          - code: FISE
            script: scrape:fise
          - code: FTDK
            script: scrape:ftdk
          - code: FTNO
            script: scrape:ftno
          - code: CNBCZ
            script: scrape:cnbcz
          - code: CYSEC
            script: scrape:cysec
          - code: FINFSA
            script: scrape:finfsa
          - code: IVASS
            script: scrape:ivass
          - code: FSRA
            script: scrape:fsra
          - code: GFSC
            script: scrape:gfsc
          - code: SEC
            script: scrape:sec
          - code: OCC
            script: scrape:occ
          - code: FINCEN
            script: scrape:fincen
          - code: FINRA
            script: scrape:finra
          - code: SEBI
            script: scrape:sebi
          - code: ASIC
            script: scrape:asic
          - code: HKMA
            script: scrape:hkma
          - code: FMANZ
            script: scrape:fmanz
          - code: MAS
            script: scrape:mas
          - code: SC
            script: scrape:sc
          - code: BMA
            script: scrape:bma
          - code: CIMA
            script: scrape:cima
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify environment configuration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is not set."
            exit 1
          fi

          if [ "${{ matrix.code }}" = "SEC" ] && [ -z "$SEC_USER_AGENT" ]; then
            echo "SEC_USER_AGENT is required for SEC scraping."
            exit 1
          fi

          echo "Environment validation passed for ${{ matrix.code }}."

      - name: Run ${{ matrix.code }} scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FCA_USER_AGENT: ${{ secrets.FCA_USER_AGENT }}
          FCA_YEARS: ${{ vars.FCA_YEARS }}
          FCA_START_YEAR: ${{ vars.FCA_START_YEAR }}
          FCA_END_YEAR: ${{ vars.FCA_END_YEAR }}
          FCA_SINCE_DATE: ${{ vars.FCA_SINCE_DATE }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          SEC_SINCE_YEAR: ${{ vars.SEC_SINCE_YEAR }}
          SEBI_SINCE_YEAR: ${{ vars.SEBI_SINCE_YEAR }}
          SEBI_ENRICH_LIMIT: ${{ vars.SEBI_ENRICH_LIMIT }}
          CNBCZ_SINCE_YEAR: ${{ vars.CNBCZ_SINCE_YEAR }}
          CNBCZ_PDF_ENRICH_LIMIT: ${{ vars.CNBCZ_PDF_ENRICH_LIMIT }}
          CYSEC_PDF_ENRICH_LIMIT: ${{ vars.CYSEC_PDF_ENRICH_LIMIT }}
          TS_NODE_PROJECT: tsconfig.json
          SCRAPER_RUN_SUMMARY_FILE: /tmp/${{ matrix.code }}-scrape-summary.json
        run: |
          echo "Starting ${{ matrix.code }} via npm run ${{ matrix.script }}"
          npm run ${{ matrix.script }}

      - name: Print structured scraper summary
        if: always()
        run: |
          SUMMARY_FILE="/tmp/${{ matrix.code }}-scrape-summary.json"
          if [ -f "$SUMMARY_FILE" ]; then
            echo "Structured summary for ${{ matrix.code }}:"
            cat "$SUMMARY_FILE"
          else
            echo "No structured summary emitted for ${{ matrix.code }}."
          fi

  freshness:
    name: Check live-regulator freshness
    if: always()
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run freshness check for daily live regulators
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm run check:live-freshness -- --cadence=daily --json > /tmp/daily-live-regulator-health.json
          cat /tmp/daily-live-regulator-health.json

      - name: Upload daily live-regulator health summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: daily-live-regulator-health
          path: /tmp/daily-live-regulator-health.json
          if-no-files-found: ignore

      - name: Check for consecutive failures and alert
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-2
          ALERT_EMAIL: ${{ vars.ALERT_EMAIL || 'ademola@memaconsultants.com' }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          FAILING_REGULATORS=$(node -e "
            const pg = require('pg');
            const client = new pg.Client({ connectionString: process.env.DATABASE_URL, ssl: { rejectUnauthorized: false } });
            client.connect().then(async () => {
              const { rows } = await client.query(\`
                WITH recent AS (
                  SELECT regulator, status,
                    ROW_NUMBER() OVER (PARTITION BY regulator ORDER BY started_at DESC) AS rn
                  FROM scraper_runs
                  WHERE started_at > NOW() - INTERVAL '7 days'
                )
                SELECT regulator
                FROM recent
                WHERE rn <= 2 AND status = 'error'
                GROUP BY regulator
                HAVING COUNT(*) = 2
              \`);
              if (rows.length > 0) {
                process.stdout.write(rows.map(r => r.regulator).join(', '));
              }
              await client.end();
            }).catch(() => { process.exit(0); });
          " 2>/dev/null)
          set -e

          if [ -n "$FAILING_REGULATORS" ]; then
            echo "⚠️ Consecutive failures detected for: $FAILING_REGULATORS"

            cat > /tmp/ses-alert.json <<SESEOF
          {
            "Source": "alerts@memaconsultants.com",
            "Destination": { "ToAddresses": ["${ALERT_EMAIL}"] },
            "Message": {
              "Subject": { "Data": "SCRAPER ALERT: Consecutive failures for ${FAILING_REGULATORS}" },
              "Body": { "Text": { "Data": "The following regulators have failed 2 consecutive scraper runs:\n\n${FAILING_REGULATORS}\n\nPlease investigate.\n\nWorkflow: ${WORKFLOW_URL}" } }
            }
          }
          SESEOF

            aws ses send-email --cli-input-json file:///tmp/ses-alert.json --region eu-west-2 || echo "Failed to send alert email"
          else
            echo "✅ No consecutive scraper failures detected"
          fi
