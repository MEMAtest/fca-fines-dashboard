name: Daily Live Regulator Scrapers

on:
  workflow_dispatch:
  schedule:
    - cron: "45 5 * * *" # 05:45 UTC daily stable live-regulator batch

jobs:
  scrape:
    name: Scrape ${{ matrix.code }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: live-regulator-${{ matrix.code }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - code: FCA
            script: scrape:fines
          - code: BaFin
            script: scrape:bafin
          - code: AMF
            script: scrape:amf
          - code: CNMV
            script: scrape:cnmv
          - code: CBI
            script: scrape:cbi
          - code: SFC
            script: scrape:sfc
          - code: AFM
            script: scrape:afm
          - code: DNB
            script: scrape:dnb
          - code: ECB
            script: scrape:ecb
          - code: BDI
            script: scrape:bdi
          - code: ACPR
            script: scrape:acpr
          - code: CSSF
            script: scrape:cssf
          - code: FSMA
            script: scrape:fsma
          - code: FISE
            script: scrape:fise
          - code: FTDK
            script: scrape:ftdk
          - code: FTNO
            script: scrape:ftno
          - code: CNBCZ
            script: scrape:cnbcz
          - code: FSRA
            script: scrape:fsra
          - code: GFSC
            script: scrape:gfsc
          - code: SEC
            script: scrape:sec
          - code: SEBI
            script: scrape:sebi
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify environment configuration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is not set."
            exit 1
          fi

          if [ "${{ matrix.code }}" = "SEC" ] && [ -z "$SEC_USER_AGENT" ]; then
            echo "SEC_USER_AGENT is required for SEC scraping."
            exit 1
          fi

          echo "Environment validation passed for ${{ matrix.code }}."

      - name: Run ${{ matrix.code }} scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FCA_USER_AGENT: ${{ secrets.FCA_USER_AGENT }}
          FCA_YEARS: ${{ vars.FCA_YEARS }}
          FCA_START_YEAR: ${{ vars.FCA_START_YEAR }}
          FCA_END_YEAR: ${{ vars.FCA_END_YEAR }}
          FCA_SINCE_DATE: ${{ vars.FCA_SINCE_DATE }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          SEC_SINCE_YEAR: ${{ vars.SEC_SINCE_YEAR }}
          SEBI_SINCE_YEAR: ${{ vars.SEBI_SINCE_YEAR }}
          SEBI_ENRICH_LIMIT: ${{ vars.SEBI_ENRICH_LIMIT }}
          CNBCZ_SINCE_YEAR: ${{ vars.CNBCZ_SINCE_YEAR }}
          CNBCZ_PDF_ENRICH_LIMIT: ${{ vars.CNBCZ_PDF_ENRICH_LIMIT }}
          TS_NODE_PROJECT: tsconfig.json
          SCRAPER_RUN_SUMMARY_FILE: /tmp/${{ matrix.code }}-scrape-summary.json
        run: |
          echo "Starting ${{ matrix.code }} via npm run ${{ matrix.script }}"
          npm run ${{ matrix.script }}

      - name: Print structured scraper summary
        if: always()
        run: |
          SUMMARY_FILE="/tmp/${{ matrix.code }}-scrape-summary.json"
          if [ -f "$SUMMARY_FILE" ]; then
            echo "Structured summary for ${{ matrix.code }}:"
            cat "$SUMMARY_FILE"
          else
            echo "No structured summary emitted for ${{ matrix.code }}."
          fi

  freshness:
    name: Check live-regulator freshness
    if: always()
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run freshness check for daily live regulators
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm run check:live-freshness -- --cadence=daily --json > /tmp/daily-live-regulator-health.json
          cat /tmp/daily-live-regulator-health.json

      - name: Upload daily live-regulator health summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-live-regulator-health
          path: /tmp/daily-live-regulator-health.json
          if-no-files-found: ignore
