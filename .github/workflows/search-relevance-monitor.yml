name: Search Relevance Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "43 5 * * *"

permissions:
  contents: read
  issues: write

jobs:
  live-search-relevance:
    name: Run live search relevance suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: search-relevance-monitor
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production search relevance checks
        run: |
          set -o pipefail
          npm run --silent search:eval:prod:full | tee /tmp/search-relevance-report.log

      - name: Upload search relevance report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: search-relevance-report
          path: /tmp/search-relevance-report.log
          if-no-files-found: ignore

      - name: Open or update failure issue
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = "Search relevance monitor failed";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "The scheduled production search relevance monitor failed.",
              "",
              `Run: ${runUrl}`,
              `Ref: ${context.ref}`,
              `SHA: ${context.sha}`,
              "",
              "Check the uploaded `search-relevance-report` artifact and the failed workflow logs.",
            ].join("\n");

            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q: query, per_page: 1 });
            const issue = existing.data.items.find((item) => item.title === title);

            if (issue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
