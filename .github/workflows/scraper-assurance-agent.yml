name: Scraper Assurance Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *" # every 3 hours, offset from scraper batches

jobs:
  assurance:
    name: Run scraper assurance checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: scraper-assurance-agent
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run assurance agent
        id: assurance
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_TRIAGE_PROVIDER: deepseek
          AI_TRIAGE_MODEL: deepseek-v4-flash
          AI_TRIAGE_MAX_CALLS_PER_RUN: 1
          AI_TRIAGE_MAX_INPUT_TOKENS: 30000
          AI_TRIAGE_MAX_OUTPUT_TOKENS: 1200
          ALERT_EMAIL: ${{ vars.ALERT_EMAIL || 'ademola@memaconsultants.com' }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          npm run --silent check:scraper-assurance -- \
            --json \
            --exit-code \
            --output=/tmp/scraper-assurance-report.json \
            --ses-output=/tmp/scraper-assurance-ses.json

      - name: Upload assurance report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scraper-assurance-report
          path: |
            /tmp/scraper-assurance-report.json
            /tmp/scraper-assurance-ses.json
          if-no-files-found: ignore

      - name: Send alert email
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-2
        run: |
          if [ -s /tmp/scraper-assurance-ses.json ]; then
            aws ses send-email --cli-input-json file:///tmp/scraper-assurance-ses.json --region eu-west-2
          else
            echo "No scraper assurance alert needed."
          fi

      - name: Fail on action-required findings
        if: always()
        run: |
          if [ "${{ steps.assurance.outcome }}" != "success" ]; then
            echo "Scraper assurance found action-required or critical findings."
            exit 1
          fi

          echo "Scraper assurance completed without action-required findings."
