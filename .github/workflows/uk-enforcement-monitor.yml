name: UK Enforcement Monitor

on:
  workflow_dispatch:
  # Scheduled run disabled 2026-06-02: scrape:uk-enforcement (scrapeFcaEnforcement.ts)
  # targets fca.org.uk, which sits behind Cloudflare. GitHub Actions runner IPs get a
  # 403 / JS challenge, so the daily cron could never succeed — it only produced daily
  # `error` rows in scraper_runs and recurring "UK enforcement monitor failed" issues.
  # Data is maintained via manual workflow_dispatch runs meanwhile. Re-enable the cron
  # once scrapeFcaEnforcement.ts is migrated to FlareSolverr / Puppeteer to clear the
  # Cloudflare challenge (note: Hetzner IPs are also challenged, so a headless-browser
  # solver is required, not just a different egress IP).
  # schedule:
  #   - cron: "20 6 * * *" # 06:20 UTC daily for UK enforcement sources

permissions:
  contents: read
  issues: write

jobs:
  scrape-and-check:
    name: Scrape and check UK enforcement
    runs-on: ubuntu-latest
    timeout-minutes: 40
    concurrency:
      group: uk-enforcement-monitor
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify environment configuration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is not set."
            exit 1
          fi
          echo "Environment validation passed for UK enforcement."

      - name: Run UK enforcement scraper
        id: scraper
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TS_NODE_PROJECT: tsconfig.json
        run: npm run scrape:uk-enforcement

      - name: Run UK enforcement health check
        id: health
        if: always()
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm run --silent check:uk-enforcement-health -- --json > /tmp/uk-enforcement-health.json
          cat /tmp/uk-enforcement-health.json

      - name: Upload UK enforcement health summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: uk-enforcement-health
          path: /tmp/uk-enforcement-health.json
          if-no-files-found: ignore

      - name: Fail on UK enforcement monitor errors
        if: always()
        run: |
          if [ "${{ steps.health.outcome }}" != "success" ]; then
            echo "UK enforcement health check failed."
            exit 1
          fi

          if [ "${{ steps.scraper.outcome }}" != "success" ]; then
            echo "UK enforcement scraper had source-level failures, but live source health remains acceptable."
          fi

          echo "UK enforcement monitor completed successfully."

      - name: Open or update failure issue
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = "UK enforcement monitor failed";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "The scheduled UK enforcement scraper or health check failed.",
              "",
              `Run: ${runUrl}`,
              `Ref: ${context.ref}`,
              `SHA: ${context.sha}`,
              "",
              "Check the uploaded `uk-enforcement-health` artifact and the failed workflow logs.",
            ].join("\n");

            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q: query, per_page: 1 });
            const issue = existing.data.items.find((item) => item.title === title);

            if (issue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
