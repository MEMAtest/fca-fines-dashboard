name: Global Messaging Update - Complete Test Suite

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'index.html'
      - 'feature-validation/**'
      - '.github/workflows/fca-validation.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'index.html'
      - 'feature-validation/**'
      - '.github/workflows/fca-validation.yml'

jobs:
  pre-flight:
    name: Pre-flight Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check forbidden phrases
        run: |
          set +e
          FORBIDDEN=(
            "flagship FCA"
            "FCA benchmark"
            "in the FCA style"
            "FCA fines database"
            "historical FCA depth"
            "FCA-centric"
          )
          FILES=(
            "index.html"
            "src/components/GlobeHero.tsx"
            "src/pages/Blog.tsx"
          )
          FOUND=0
          for file in "${FILES[@]}"; do
            if [ -f "$file" ]; then
              for phrase in "${FORBIDDEN[@]}"; do
                if grep -qi "$phrase" "$file"; then
                  echo "FORBIDDEN: $phrase in $file"
                  FOUND=1
                fi
              done
            fi
          done
          exit $FOUND

      - name: Validate constants
        run: |
          grep -q "REGULATOR_COUNT.*45+" src/constants/site.ts || exit 1

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: pre-flight

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          npm run test -- feature-validation/unit/seo-metadata.test.ts --run
          npm run test -- feature-validation/unit/copy-consistency.test.ts --run
          npm run test -- feature-validation/contract/schema-validation.test.ts --run

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: pre-flight

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run E2E tests
        run: npm run test:e2e -- feature-validation/e2e/

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [pre-flight, unit-tests, e2e-tests]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.pre-flight.result }}" != "success" ] || [ "${{ needs.unit-tests.result }}" != "success" ] || [ "${{ needs.e2e-tests.result }}" != "success" ]; then
            exit 1
          fi
