name: RegActions Editorial Engine

permissions:
  contents: write

on:
  schedule:
    - cron: '0 3 * * 1,3,5'  # Mon/Wed/Fri at 03:00 UTC
  workflow_dispatch:
    inputs:
      topic_override:
        description: 'Override topic selection (e.g. "AML enforcement trends")'
        required: false
        type: string

concurrency:
  group: regactions-editorial-engine
  cancel-in-progress: false

jobs:
  generate-review-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Generate structured article draft
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SES_REGION: ${{ secrets.AWS_SES_REGION }}
          SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}
          BLOG_REVIEW_EMAIL: ${{ secrets.BLOG_REVIEW_EMAIL }}
          TOPIC_OVERRIDE: ${{ github.event.inputs.topic_override || '' }}
        run: npx tsx scripts/generate-ai-article.ts --result-file=/tmp/editorial-result.json

      - name: Resolve generated slug
        id: article
        run: echo "slug=$(node -p \"JSON.parse(require('fs').readFileSync('/tmp/editorial-result.json','utf8')).slug\")" >> "$GITHUB_OUTPUT"

      - name: Independent regulatory, copy, visual, and head review
        id: review
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx tsx scripts/review-article.ts "${{ steps.article.outputs.slug }}"

      - name: Publisher Agent
        id: publish
        if: steps.review.outcome == 'success'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx tsx scripts/approve-article.ts "${{ steps.article.outputs.slug }}"

      - name: Commit editorial artifact
        run: |
          git config user.name "RegActions Bot"
          git config user.email "bot@regactions.com"
          git add -A src/data/blogArticles.ts scripts/data public
          if [ "${{ steps.review.outcome }}" = "success" ]; then
            git diff --staged --quiet || git commit -m "feat(blog): publish ${{ steps.article.outputs.slug }}"
          else
            git diff --staged --quiet || git commit -m "chore(blog): retain blocked draft ${{ steps.article.outputs.slug }}"
          fi
          git push

      - name: Trigger production deploy
        if: steps.publish.outcome == 'success'
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          fi

      - name: Report blocked editorial review
        if: steps.review.outcome != 'success'
        run: |
          echo "Head Editorial Agent rejected the draft. The blocked audit artifact was retained."
          exit 1
