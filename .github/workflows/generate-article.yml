name: Generate AI Article

on:
  schedule:
    - cron: '0 3 * * 1,3,5'  # Mon/Wed/Fri at 03:00 UTC
  workflow_dispatch:
    inputs:
      topic_override:
        description: 'Override topic selection (e.g. "AML enforcement trends")'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Generate article draft
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SES_REGION: ${{ secrets.AWS_SES_REGION }}
          SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}
          BLOG_REVIEW_EMAIL: ${{ secrets.BLOG_REVIEW_EMAIL }}
          TOPIC_OVERRIDE: ${{ github.event.inputs.topic_override || '' }}
        run: npx tsx scripts/generate-ai-article.ts

      - name: Commit draft
        run: |
          git config user.name "RegActions Bot"
          git config user.email "bot@regactions.com"
          git add scripts/data/
          git diff --staged --quiet || git commit -m "chore(blog): save AI draft $(date +%Y-%m-%d)"
          git push
